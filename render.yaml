# Render Blueprint - SHRUG STAFF Deployment
#
# Backend uses Docker (Python 3.11 from Dockerfile)
# Frontend created manually via Dashboard

services:
  # ============== FastAPI Backend (via Docker) ==============
  - type: web
    name: shrug-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"