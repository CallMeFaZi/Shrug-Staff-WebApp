# Render Blueprint - SHRUG STAFF Deployment
# Deploy with: https://render.com/docs/blueprint-spec
#
# IMPORTANT: PostgreSQL must be created manually via Render Dashboard first.
# See README for step-by-step instructions.

services:
  # ============== FastAPI Backend ==============
  - type: web
    name: shrug-backend
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"

  # ============== React Frontend ==============
  - type: web
    name: shrug-frontend
    plan: free
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff