# Render Blueprint - SHRUG STAFF Deployment
# Deploy with: https://render.com/docs/blueprint-spec
#
# IMPORTANT: PostgreSQL must be created manually via Render Dashboard first.
# Then set DATABASE_URL + VITE_API_URL as environment variables manually.

services:
  # ============== FastAPI Backend ==============
  - type: web
    name: shrug-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"

  # ============== React Frontend (Static Site) ==============
  - type: web
    name: shrug-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff