# Render Blueprint - SHRUG STAFF Deployment
#
# NOTE: Static site buildCommand doesn't work reliably in Blueprint.
# Recommended: Deploy manually via Render Dashboard instead.
#
# Backend (Web Service):  https://dashboard.render.com/select-repo?type=web
# Frontend (Static Site): https://dashboard.render.com/select-repo?type=static
#
# OR use this Blueprint for backend only, create frontend manually:

services:
  # ============== FastAPI Backend ==============
  - type: web
    name: shrug-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"